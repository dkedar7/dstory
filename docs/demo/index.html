/* story.css — layout, scrollytelling mechanics, typography. Theme tokens come from theme.css. */

* { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: var(--step-0);
  line-height: 1.55;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

/* ---------- atmosphere overlays ---------- */
.atmosphere { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }
.atmosphere--grain {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity: var(--grain-opacity, 0);
  mix-blend-mode: overlay;
}
.atmosphere--vignette {
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,calc(var(--vignette-strength, 0) * 1)) 100%);
}

/* ---------- hero ---------- */
.hero {
  position: relative;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 4rem 1.5rem;
  overflow: hidden;
}
.hero__bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, color-mix(in oklch, var(--accent) 12%, transparent), transparent 55%),
    radial-gradient(circle at 80% 70%, color-mix(in oklch, var(--accent-2) 10%, transparent), transparent 55%);
  opacity: 0.9;
}
.hero__inner {
  position: relative;
  max-width: 50rem;
  text-align: left;
}
.hero__eyebrow {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 1.5rem;
}
.hero__headline {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--step-4);
  line-height: 1.02;
  letter-spacing: -0.015em;
  margin: 0 0 1.25rem;
  text-wrap: balance;
}
.hero__deck {
  font-size: var(--step-1);
  color: var(--ink-soft);
  max-width: 42ch;
  margin: 0 0 2.5rem;
  text-wrap: pretty;
}
.hero__byline {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  display: flex;
  gap: 1rem;
  align-items: center;
}
.hero__byline > * + *::before { content: "·"; margin-right: 0.5em; opacity: 0.6; }
.hero__scrollcue {
  position: absolute;
  bottom: 2rem; left: 1.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  letter-spacing: 0.14em; text-transform: uppercase;
  animation: cue 2.4s ease-in-out infinite;
}
@keyframes cue { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

/* ---------- main story column / scenes ---------- */
.story {
  display: flex;
  flex-direction: column;
  gap: 6rem;
  padding: 6rem 0;
}
.scene { padding: 0 1.5rem; }

/* Simple scene: a single chart-driven moment, centered column. */
.scene--simple {
  max-width: 56rem;
  margin: 0 auto;
}
.scene--simple h2 {
  font-family: var(--font-display);
  font-size: var(--step-2);
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0 0 0.75rem;
  text-wrap: balance;
}
.scene--simple > p {
  font-size: var(--step-0);
  color: var(--ink-soft);
  margin: 0 0 2rem;
  max-width: 42ch;
  text-wrap: pretty;
}
.scene--simple .scene__graphic {
  background: var(--bg-elev);
  border-radius: 4px;
  padding: 1.5rem;
  min-height: 300px;
}

/* Custom scene: chrome-free. The renderer owns the entire <section>.
   No max-width, no padding, no .scene__graphic wrapper. */
.scene--custom {
  padding: 0;
}

/* Per-scene width modifiers (set via Scene.width in data.json).
   Override the default ~56rem max-width of simple scenes (and any other
   width-respecting scene kind). */
.scene--w-narrow { max-width: 36rem; margin: 0 auto; }
.scene--w-wide   { max-width: 78rem; margin: 0 auto; }
.scene--w-full {
  max-width: none;
  margin: 0;
  padding-left: 0;
  padding-right: 0;
  width: 100%;
}

/* Scrollytelling: sticky graphic + stepping text */
.scene--scrolly {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
  max-width: 80rem;
  margin: 0 auto;
}
.scene--scrolly .scene__graphic {
  position: sticky;
  top: 10vh;
  height: 80vh;
  display: grid;
  place-items: center;
  background: var(--bg-elev);
  border-radius: 4px;
  padding: 1.5rem;
}
.scene--scrolly .scene__graphic svg { max-width: 100%; height: 100%; }

/* Vizzu scenes share the scrolly grid but need a full-bleed canvas (not centered). */
.scene--vizzu .scene__graphic {
  display: block;
  place-items: initial;
  padding: 0.5rem;
  overflow: hidden;
}
.scene--vizzu .scene__graphic > canvas { width: 100% !important; height: 100% !important; }
.scene--vizzu__headline {
  font-family: var(--font-display);
  font-size: var(--step-1);
  letter-spacing: -0.01em;
  margin: 0 0 1.5rem;
  color: var(--ink-soft);
}
.scene--scrolly .scene__text { display: flex; flex-direction: column; gap: 0; }
.scene--scrolly .step {
  min-height: 90vh;
  padding: 30vh 0;
  opacity: 0.45;
  transition: opacity 400ms var(--easing-out);
}
.scene--scrolly .step.is-active { opacity: 1; }
.scene--scrolly .step h3 {
  font-family: var(--font-display);
  font-size: var(--step-2);
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0 0 0.75rem;
  text-wrap: balance;
}
.scene--scrolly .step p {
  font-size: var(--step-0);
  color: var(--ink-soft);
  margin: 0;
  max-width: 38ch;
  text-wrap: pretty;
}

/* Full-bleed cinematic */
.scene--bleed {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: var(--bg-deep);
  color: var(--ink-invert);
  position: relative;
  overflow: hidden;
}
.scene--bleed .scene__bleedbg {
  position: absolute; inset: 0;
  z-index: 0;
}
.scene--bleed .scene__bleedinner {
  position: relative; z-index: 1;
  max-width: 36rem; padding: 4rem 1.5rem;
  text-align: center;
}
.scene--bleed h2 {
  font-family: var(--font-display);
  font-size: var(--step-3);
  margin: 0 0 1rem;
  line-height: 1.05;
  text-wrap: balance;
}
.scene--bleed p {
  font-size: var(--step-1);
  margin: 0;
  opacity: 0.85;
  text-wrap: pretty;
}

/* Pinned reveal: one full-viewport object, scroll-progress driven */
.scene--pinned {
  position: relative;
  height: 300vh;            /* tall section so scroll can drive progress */
}
.scene--pinned .scene__pin {
  position: sticky;
  top: 0;
  height: 100vh;
  display: grid;
  place-items: center;
}

/* Inline annotation typography (used by D3 callouts) */
.annotation {
  font-family: var(--font-mono);
  font-size: 11px;
  fill: var(--ink-soft);
  pointer-events: none;
}
.annotation--strong { fill: var(--accent); font-weight: 600; }

/* Source line under each scene with data */
.scene__source {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  margin: 1.5rem 0 0;
}

/* ---------- outro ---------- */
.outro { padding: 6rem 1.5rem; background: var(--bg-elev); border-top: 1px solid var(--rule); }
.outro__inner { max-width: 50rem; margin: 0 auto; }
.outro__title {
  font-family: var(--font-display);
  font-size: var(--step-2);
  margin: 0 0 1.5rem;
}
.outro__sources { list-style: none; padding: 0; margin: 0 0 2rem; display: grid; gap: 0.75rem; }
.outro__sources a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
.outro__sources a:hover { color: var(--accent); }
.outro__credits {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  margin: 0;
}

/* ---------- responsive ---------- */
@media (max-width: 720px) {
  .scene--scrolly { grid-template-columns: 1fr; gap: 0; }
  .scene--scrolly .scene__graphic { height: 60vh; top: 18vh; }
  .scene--scrolly .step { min-height: 70vh; padding: 6vh 0; }
  .hero__headline { font-size: var(--step-3); }
  .hero { padding: 3rem 1.25rem; }
}

/* ---------- slides mode (meta.mode === "slides") ---------- */
html.story-mode--slides,
body.story-mode--slides {
  height: 100vh;
  overflow: hidden;
  margin: 0;
}

/* The story container becomes a slide stage; hero/scenes/outro are layered slides. */
body.story-mode--slides #story {
  display: contents;
  padding: 0;
  gap: 0;
}

body.story-mode--slides .hero,
body.story-mode--slides .scene,
body.story-mode--slides .outro {
  position: absolute;
  inset: 0;
  margin: 0;
  width: 100vw;
  height: 100vh;
  opacity: 0;
  pointer-events: none;
  overflow: auto;             /* in case content is taller than viewport */
  transition: opacity 250ms var(--easing-out, ease);
  z-index: 1;
}
body.story-mode--slides .is-current {
  opacity: 1;
  pointer-events: auto;
  z-index: 2;
}

/* Hero in slide mode: hide the scroll cue (no scrolling here). */
body.story-mode--slides .hero__scrollcue { display: none; }

/* Scrolly scenes in slide mode: become a 2-column static layout, only
   the active step's text panel is visible. The chart is no longer sticky. */
body.story-mode--slides .scene--scrolly {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 4rem;
  padding: 4rem 3rem 6rem;
  max-width: 100%;
}
body.story-mode--slides .scene--scrolly .scene__graphic {
  position: relative;
  top: 0;
  height: 70vh;
  max-height: 70vh;
}
body.story-mode--slides .scene--scrolly .step {
  display: none;
  min-height: auto;
  padding: 0;
  opacity: 1;
}
body.story-mode--slides .scene--scrolly .step.is-active {
  display: block;
}

/* Vizzu scenes share the scrolly layout treatment in slides mode. */
body.story-mode--slides .scene--vizzu .scene__graphic { padding: 0.25rem; }
body.story-mode--slides .scene--vizzu__headline { display: none; }  /* the per-step headline is enough in slides */

/* Simple scene in slides mode: vertically center the content column.
   Flexbox is more reliable than grid+align-content for auto-sized children. */
body.story-mode--slides .scene--simple {
  padding: 4rem 3rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  max-width: none;
  margin: 0;
}
body.story-mode--slides .scene--simple > * {
  max-width: 64rem;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}

/* Bleed in slides mode is already viewport-filling; just no extra padding. */
body.story-mode--slides .scene--bleed { padding: 0; }

/* Outro in slides mode: center the source list. */
body.story-mode--slides .outro { display: grid; place-items: center; }

/* The slide controls bar */
.slide-controls {
  position: fixed;
  bottom: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 0.75rem;
  background: color-mix(in oklch, var(--bg-elev) 85%, transparent);
  backdrop-filter: blur(8px);
  border: 1px solid var(--rule);
  border-radius: 999px;
  z-index: 9000;
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-soft);
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
}
.slide-controls[hidden] { display: none; }
.slide-controls__btn {
  display: inline-grid;
  place-items: center;
  width: 32px; height: 32px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: background-color 150ms var(--easing-out, ease);
}
.slide-controls__btn:hover { background: color-mix(in oklch, var(--accent) 15%, transparent); color: var(--accent); }
.slide-controls__btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.slide-controls__btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.slide-controls__indicator {
  min-width: 4ch;
  text-align: center;
  letter-spacing: 0.04em;
  user-select: none;
}

/* In slides mode, hide the sources atmosphere bleeding behind the controls. */
body.story-mode--slides .atmosphere--vignette { opacity: 0.5; }

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
  .hero__scrollcue { animation: none; }
}

  <nav class="slide-controls" data-slide-controls hidden aria-label="Slide navigation">

    </button>

    <button type="button" class="slide-controls__btn" data-slide-next aria-label="Next slide">
      <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M6 2l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- D3 + Scrollama (UMD globals: d3, scrollama) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://unpkg.com/scrollama"></script>

  <!-- Motion One + Vizzu: ESM-only on CDN. We bridge them to globals so the
       rest of the code (and bundled scenes) can be plain non-module scripts. -->
  <script type="module">
    import { animate, stagger, inView, scroll, spring }
      from "https://cdn.jsdelivr.net/npm/motion@10/+esm";
    window.MOTION = { animate, stagger, inView, scroll, spring };
    window.dispatchEvent(new Event("motion:ready"));
  </script>
  <script type="module">
    // Vizzu (animated data pivots) — only used by `kind: "vizzu"` scenes.
    // Safe to leave loaded even if no vizzu scenes exist; ~60 KB gzipped.
    import Vizzu from "https://cdn.jsdelivr.net/npm/vizzu@0.18/dist/vizzu.min.js";
    window.Vizzu = Vizzu;
    window.dispatchEvent(new Event("vizzu:ready"));
  </script>

  <!-- story.js (orchestration) and scenes (each calls window.STORY.register).
       Plain scripts so they inline cleanly into a single self-contained HTML. -->
  <script>
// story.js — orchestration. Reads window.__STORY_DATA__ (injected at bundle time)
// or fetches data.json (dev mode), then builds scenes.
//
// Per-scene chart code lives in scenes/<scene-id>.js — author writes those.
// Each scene file calls window.STORY.register("scene-id", drawFn).
//
// Motion One is loaded via a tiny module-to-global wrapper in index.html
// and exposed on window.MOTION = { animate, stagger, inView, scroll }.
// (We avoid ES-module imports in this file so the bundled HTML works under
// the file:// protocol — browsers block cross-origin module fetches there.)

const SCENE_RENDERERS = {};

// Read Motion at call time, not at module-load — the ESM shim may not have
// resolved yet. Each call falls back to a no-op if Motion isn't ready.
const animate = (...args) => (window.MOTION?.animate || (() => {}))(...args);
const stagger = (...args) => (window.MOTION?.stagger || (() => 0))(...args);
const inView  = (target, fn, opts) =>
  (window.MOTION?.inView || ((t, f) => f({ target: t })))(target, fn, opts);

function register(id, fn) {
  SCENE_RENDERERS[id] = fn;
}
window.STORY = { register };

// Wait for Motion to load before init (so opening animations actually animate).
function waitForMotion(timeoutMs = 2500) {
  return new Promise(resolve => {
    if (window.MOTION) return resolve();
    const t = setTimeout(resolve, timeoutMs);  // proceed anyway after timeout
    const check = setInterval(() => {
      if (window.MOTION) { clearInterval(check); clearTimeout(t); resolve(); }
    }, 30);
  });
}

const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

async function getData() {
  if (window.__STORY_DATA__) return window.__STORY_DATA__;
  const res = await fetch("data.json");
  return res.json();
}

function el(tag, attrs = {}, ...kids) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null) continue;
    n.append(typeof k === "string" ? document.createTextNode(k) : k);
  }
  return n;
}

function renderHero(meta) {
  const h = document.querySelector(".hero");
  if (!h) return;
  h.querySelector(".hero__eyebrow").textContent = meta.subtitle || "";
  h.querySelector(".hero__headline").textContent = meta.title || "Untitled";
  h.querySelector(".hero__deck").textContent = meta.deck || "";
  h.querySelector(".hero__author").textContent = meta.author || "";
  h.querySelector(".hero__date").textContent = meta.published || "";

  if (!reduceMotion) {
    animate(
      [h.querySelector(".hero__eyebrow"), h.querySelector(".hero__headline"),
       h.querySelector(".hero__deck"), h.querySelector(".hero__byline")],
      { opacity: [0, 1], y: [16, 0] },
      { duration: 0.8, easing: [0.22, 1, 0.36, 1], delay: stagger(0.12, { start: 0.1 }) }
    );
  }
}

function renderSources(sources = [], meta = {}) {
  const ul = document.getElementById("sources");
  if (!ul) return;
  ul.replaceChildren(...sources.map(s => {
    const li = el("li");
    if (s.url) {
      li.append(el("a", { href: s.url, target: "_blank", rel: "noopener" }, s.name));
      if (s.accessed) li.append(el("span", { class: "outro__accessed" }, ` · accessed ${s.accessed}`));
    } else {
      li.textContent = s.name;
    }
    return li;
  }));
  const author = document.getElementById("credits-author");
  const pub = document.getElementById("credits-published");
  if (author) author.textContent = meta.author || "";
  if (pub) pub.textContent = meta.published || "";
}

function buildScene(scene) {
  let node;
  if (scene.kind === "scrolly")      node = buildScrollyScene(scene);
  else if (scene.kind === "bleed")   node = buildBleedScene(scene);
  else if (scene.kind === "pinned")  node = buildPinnedScene(scene);
  else if (scene.kind === "vizzu")   node = buildVizzuScene(scene);
  else if (scene.kind === "custom")  node = buildCustomScene(scene);
  else                                node = buildSimpleScene(scene);
  // Apply width modifier if set (default | narrow | wide | full)
  if (scene.width && scene.width !== "default") {
    node.classList.add("scene--w-" + scene.width);
  }
  return node;
}

function buildSimpleScene(scene) {
  const wrap = el("section", { class: "scene scene--simple", "data-scene": scene.id, id: scene.id });
  if (scene.chrome !== false) {
    wrap.append(el("h2", {}, scene.headline || ""));
    if (scene.commentary) wrap.append(el("p", {}, scene.commentary));
  }
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  if (scene.chrome !== false && scene.source_line) {
    wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  }
  return wrap;
}

function buildCustomScene(scene) {
  // Chrome-free: no h2, no p, no .scene__graphic wrapper. The renderer gets
  // the full <section> as its mount and owns the entire DOM. Use for
  // typography animations, bespoke layouts, embedded interactives, etc.
  const wrap = el("section", {
    class: "scene scene--custom", "data-scene": scene.id, id: scene.id, "data-mount": scene.id,
  });
  return wrap;
}

function buildScrollyScene(scene) {
  const wrap = el("section", { class: "scene scene--scrolly", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  const text = el("div", { class: "scene__text" });
  (scene.steps || []).forEach((step, i) => {
    const s = el("div", { class: "step", "data-step": String(i) });
    s.append(el("h3", {}, step.headline || ""));
    if (step.commentary) s.append(el("p", {}, step.commentary));
    text.append(s);
  });
  wrap.append(text);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function buildBleedScene(scene) {
  const wrap = el("section", { class: "scene scene--bleed", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__bleedbg", "data-mount": scene.id }));
  const inner = el("div", { class: "scene__bleedinner" });
  inner.append(el("h2", {}, scene.headline || ""));
  if (scene.commentary) inner.append(el("p", {}, scene.commentary));
  wrap.append(inner);
  return wrap;
}

function buildPinnedScene(scene) {
  const wrap = el("section", { class: "scene scene--pinned", "data-scene": scene.id, id: scene.id });
  const pin = el("div", { class: "scene__pin", "data-mount": scene.id });
  wrap.append(pin);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function buildVizzuScene(scene) {
  // Same shape as scrolly: sticky chart + stepping text. The chart is a Vizzu
  // canvas that morphs between frames on each step.
  const wrap = el("section", { class: "scene scene--scrolly scene--vizzu", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  const text = el("div", { class: "scene__text" });
  if (scene.headline) {
    const heading = el("h3", { class: "scene--vizzu__headline" }, scene.headline);
    text.append(heading);
  }
  (scene.frames || []).forEach((frame, i) => {
    const s = el("div", { class: "step", "data-step": String(i) });
    s.append(el("h3", {}, frame.headline || ""));
    if (frame.commentary) s.append(el("p", {}, frame.commentary));
    text.append(s);
  });
  wrap.append(text);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function activateScrollyScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const ctrl = renderer(mount, data, scene); // expected to return { onStep(i, dir) } or null
  if (slidesMode) return ctrl;  // slides controller drives onStep

  const scroller = scrollama();
  scroller.setup({
    step: sceneEl.querySelectorAll(".step"),
    offset: 0.5,
    debug: false,
  }).onStepEnter(({ element, index, direction }) => {
    element.classList.add("is-active");
    if (ctrl && typeof ctrl.onStep === "function") ctrl.onStep(index, direction);
  }).onStepExit(({ element, direction }) => {
    if (direction === "up") element.classList.remove("is-active");
  });

  window.addEventListener("resize", () => scroller.resize());
  return ctrl;
}

function activateBleedScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (renderer) {
    const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
    renderer(mount, data, scene);
  }
  if (slidesMode || reduceMotion) return null;  // slides controller handles entry; CSS drives the rest
  inView(sceneEl, () => {
    animate(
      [sceneEl.querySelector("h2"), sceneEl.querySelector("p")].filter(Boolean),
      { opacity: [0, 1], y: [12, 0] },
      { duration: 0.7, easing: [0.22, 1, 0.36, 1], delay: stagger(0.12, { start: 0.1 }) }
    );
  }, { margin: "0px 0px -25% 0px" });
  return null;
}

function activatePinnedScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const ctrl = renderer(mount, data, scene);
  if (!ctrl || typeof ctrl.onProgress !== "function") return ctrl;
  if (slidesMode) {
    // Pinned scenes are scroll-progress driven; in slides mode, show end state.
    ctrl.onProgress(1);
    return ctrl;
  }

  // Use IntersectionObserver + requestAnimationFrame for progress 0..1
  let raf = null;
  const update = () => {
    const r = sceneEl.getBoundingClientRect();
    const total = r.height - window.innerHeight;
    const p = Math.min(1, Math.max(0, -r.top / total));
    ctrl.onProgress(p);
    raf = null;
  };
  const onScroll = () => { if (!raf) raf = requestAnimationFrame(update); };
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);
  update();
  return ctrl;
}

function activateSimpleScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  // Render immediately. Renderer may use inView internally for entry animations.
  return renderer(mount, data, scene);
}

function activateCustomScene(sceneEl, scene, data, slidesMode = false) {
  // The section IS the mount. The renderer owns the entire DOM and is free to
  // build any layout, including reading scene.headline / scene.commentary /
  // scene.source_line itself if it wants to display them.
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) {
    console.warn(`[dstory] kind:"custom" scene "${scene.id}" has no registered renderer.`);
    return null;
  }
  return renderer(sceneEl, data, scene);
}

function waitForVizzu(timeoutMs = 4000) {
  return new Promise(resolve => {
    if (window.Vizzu) return resolve(window.Vizzu);
    const t = setTimeout(() => resolve(null), timeoutMs);
    const check = setInterval(() => {
      if (window.Vizzu) { clearInterval(check); clearTimeout(t); resolve(window.Vizzu); }
    }, 30);
  });
}

function buildVizzuStyle() {
  // Map theme CSS custom properties → Vizzu style object so charts inherit theme.
  const cs = getComputedStyle(document.documentElement);
  const get = k => (cs.getPropertyValue(k) || "").trim();
  const palette = [1, 2, 3, 4, 5, 6, 7]
    .map(i => get(`--cat-${i}`)).filter(Boolean).join(" ");
  const ink     = get("--ink") || "#111";
  const inkSoft = get("--ink-soft") || "#666";
  const inkFaint= get("--ink-faint") || "#999";
  const bgElev  = get("--bg-elev") || "#fff";
  const fontDisplay = get("--font-display") || "Georgia, serif";
  const fontBody    = get("--font-body")    || "system-ui, sans-serif";

  return {
    fontFamily: fontBody,
    backgroundColor: bgElev,
    plot: {
      backgroundColor: bgElev,
      marker: { colorPalette: palette || undefined },
      xAxis: {
        label: { fontSize: 11, color: inkFaint },
        title: { color: inkSoft, fontSize: 11 },
        interlacing: { color: "#00000000" },   // hide alternating bands (transparent)
      },
      yAxis: {
        label: { fontSize: 11, color: inkFaint },
        title: { color: inkSoft, fontSize: 11 },
        interlacing: { color: "#00000000" },
      },
    },
    title: {
      fontFamily: fontDisplay,
      color: ink,
      fontSize: 18,
      paddingTop: 8, paddingBottom: 8,
    },
    legend: {
      label: { color: inkSoft, fontSize: 11 },
      title: { color: inkSoft, fontSize: 11 },
    },
    logo: { filter: "opacity(0)" },             // hide Vizzu logo
  };
}

async function activateVizzuScene(sceneEl, scene, data, slidesMode = false) {
  const Vizzu = await waitForVizzu();
  if (!Vizzu) {
    console.warn("Vizzu not available — scene", scene.id, "will be inert.");
    return null;
  }
  const records = data.datasets?.[scene.dataset];
  if (!Array.isArray(records) || records.length === 0) {
    console.warn("Vizzu scene", scene.id, "missing dataset:", scene.dataset);
    return null;
  }

  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const chart = new Vizzu(mount);

  const series = (scene.series || []).map(s => ({
    name: s.name,
    type: s.type === "measure" ? "measure" : "dimension",
  }));

  // Custom renderer can override default behavior.
  const customRenderer = SCENE_RENDERERS[scene.id];
  if (customRenderer) {
    return customRenderer(mount, data, scene); // hand it the mount; it owns the chart
  }

  const themeStyle = buildVizzuStyle();
  const userStyle  = scene.style || {};

  await chart.initializing;
  const firstFrame = (scene.frames && scene.frames[0]) || {};
  try {
    await chart.animate({
      data: { series, records },
      config: firstFrame.config || {},
      style:  { ...themeStyle, ...userStyle },
    });
  } catch (e) {
    console.error(`[dstory] Vizzu init failed for scene "${scene.id}":`, e?.message || e);
    // Recover gracefully: re-try without the theme style override. Most of our
    // Vizzu issues historically have been style-shape mismatches; the chart
    // itself is usually fine.
    try {
      await chart.animate({
        data: { series, records },
        config: firstFrame.config || {},
      });
      console.warn(`[dstory] Scene "${scene.id}" rendered with default Vizzu style (theme override rejected).`);
    } catch (e2) {
      console.error(`[dstory] Scene "${scene.id}" failed to render even without style:`, e2?.message || e2);
      // Don't throw — let the rest of the page initialize.
    }
  }

  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const duration = reduce ? 0 : (scene.duration || 1.0);

  // Morph scheduler: latest target wins — fast scrolling skips stale
  // intermediate morphs instead of queueing them. (Patched to match the
  // dstory 0.5.1 runtime; this bundle predates the fix.)
  let morphing = false;
  let queuedConfig = null;
  function morphTo(config) {
    if (morphing) { queuedConfig = config; return; }
    morphing = true;
    const next = () => {
      morphing = false;
      if (queuedConfig) {
        const c = queuedConfig;
        queuedConfig = null;
        morphTo(c);
      }
    };
    chart.animate({ config }, duration).then(next, next);
  }

  // ctrl that the slides controller (or scroll mode) can call to morph to a frame.
  const ctrl = {
    onStep(i /*, direction */) {
      const frame = (scene.frames || [])[i];
      if (frame && frame.config) morphTo(frame.config);
    },
  };

  if (slidesMode) return ctrl;

  const scroller = scrollama();
  scroller.setup({
    step: sceneEl.querySelectorAll(".step"),
    offset: 0.5,
    debug: false,
  }).onStepEnter(({ element, index, direction }) => {
    element.classList.add("is-active");
    ctrl.onStep(index, direction);
  }).onStepExit(({ element, direction }) => {
    if (direction === "up") element.classList.remove("is-active");
  });
  window.addEventListener("resize", () => scroller.resize());
  return ctrl;
}

function setupSlidesController(builtScenes, data) {
  const heroEl  = document.querySelector(".hero");
  const outroEl = document.querySelector(".outro");
  document.documentElement.classList.add("story-mode--slides");
  document.body.classList.add("story-mode--slides");

  // Flat slide list: [hero, ...one-per-step-or-frame, outro].
  const slides = [];
  if (heroEl) slides.push({ kind: "hero", el: heroEl });
  for (const entry of builtScenes) {
    const stepCount = entry.scene.steps?.length || entry.scene.frames?.length || 1;
    for (let i = 0; i < stepCount; i++) {
      slides.push({ kind: "scene", el: entry.node, sceneEntry: entry, stepIdx: i, totalSteps: stepCount });
    }
  }
  if (outroEl) slides.push({ kind: "outro", el: outroEl });

  // Initialize: every slide hidden except the first.
  slides.forEach((s, i) => {
    if (i === 0) {
      s.el.classList.add("is-current");
    } else {
      s.el.setAttribute("aria-hidden", "true");
    }
  });

  let current = 0;
  const indicator = document.querySelector("[data-slide-indicator]");
  const updateIndicator = () => {
    if (indicator) indicator.textContent = `${current + 1} / ${slides.length}`;
  };
  updateIndicator();

  function show(idx, dir = "forward") {
    if (idx < 0 || idx >= slides.length) return;
    if (idx === current) return;
    const prev = slides[current];
    const next = slides[idx];

    if (prev.el !== next.el) {
      prev.el.classList.remove("is-current");
      prev.el.setAttribute("aria-hidden", "true");
      next.el.classList.add("is-current");
      next.el.removeAttribute("aria-hidden");
    }

    if (next.kind === "scene") {
      const steps = next.el.querySelectorAll(".step");
      steps.forEach((st, i) => st.classList.toggle("is-active", i === next.stepIdx));
      if (next.sceneEntry.ctrl?.onStep) {
        next.sceneEntry.ctrl.onStep(next.stepIdx, dir === "forward" ? "down" : "up");
      }
    }

    current = idx;
    updateIndicator();
  }

  // Trigger first slide's chart state if applicable.
  const first = slides[0];
  if (first?.kind === "scene") {
    const steps = first.el.querySelectorAll(".step");
    steps.forEach((st, i) => st.classList.toggle("is-active", i === first.stepIdx));
    if (first.sceneEntry.ctrl?.onStep) first.sceneEntry.ctrl.onStep(first.stepIdx, "down");
  }

  // Keyboard navigation
  document.addEventListener("keydown", (e) => {
    if (e.target.matches?.("input, textarea, [contenteditable]")) return;
    switch (e.key) {
      case "ArrowRight":
      case "PageDown":
      case " ":
        e.preventDefault(); show(current + 1, "forward"); break;
      case "ArrowLeft":
      case "PageUp":
        e.preventDefault(); show(current - 1, "backward"); break;
      case "Home":
        e.preventDefault(); show(0, "backward"); break;
      case "End":
        e.preventDefault(); show(slides.length - 1, "forward"); break;
    }
  });

  // Click-anywhere navigation (skip interactive elements + the controls bar)
  document.addEventListener("click", (e) => {
    if (e.target.closest("a, button, input, textarea, select, [contenteditable], [data-slide-controls]")) return;
    if (e.shiftKey) show(current - 1, "backward");
    else show(current + 1, "forward");
  });

  // Buttons
  document.querySelector("[data-slide-prev]")?.addEventListener("click", () => show(current - 1, "backward"));
  document.querySelector("[data-slide-next]")?.addEventListener("click", () => show(current + 1, "forward"));

  // Reveal the controls.
  const controlsEl = document.querySelector("[data-slide-controls]");
  if (controlsEl) controlsEl.removeAttribute("hidden");
}

async function init() {
  await waitForMotion();
  const data = await getData();
  renderHero(data.meta || {});
  renderSources(data.meta?.sources || [], data.meta || {});

  const slidesMode = data.meta?.mode === "slides";
  if (slidesMode) {
    document.documentElement.classList.add("story-mode--slides");
    document.body.classList.add("story-mode--slides");
  }

  const story = document.getElementById("story");
  const built = (data.scenes || []).map(s => {
    const node = buildScene(s);
    story.append(node);
    return { node, scene: s, ctrl: null };
  });

  // Wait one frame so layout settles before activating renderers.
  // We use setTimeout(16) rather than requestAnimationFrame because rAF can
  // be starved on very long pages (>10k px) when other scripts (e.g. Vizzu
  // wasm) are still initializing. setTimeout always fires.
  await new Promise(r => setTimeout(r, 16));
  for (const entry of built) {
    const s = entry.scene;
    try {
      if (s.kind === "scrolly")      entry.ctrl = activateScrollyScene(entry.node, s, data, slidesMode);
      else if (s.kind === "bleed")   entry.ctrl = activateBleedScene(entry.node, s, data, slidesMode);
      else if (s.kind === "pinned")  entry.ctrl = activatePinnedScene(entry.node, s, data, slidesMode);
      else if (s.kind === "vizzu")   entry.ctrl = await activateVizzuScene(entry.node, s, data, slidesMode);
      else if (s.kind === "custom")  entry.ctrl = activateCustomScene(entry.node, s, data, slidesMode);
      else                            entry.ctrl = activateSimpleScene(entry.node, s, data, slidesMode);
    } catch (sceneErr) {
      // Don't let one failing scene kill the rest of the page.
      console.error(`[dstory] Scene "${s.id}" failed to activate:`, sceneErr?.message || sceneErr);
    }
  }

  if (slidesMode) setupSlidesController(built, data);
}

// Defer init until DOMContentLoaded so all `<script defer>` scenes have had
// a chance to call STORY.register() (defer scripts execute in document order
// and complete before DOMContentLoaded fires).
if (document.readyState === "complete") {
  // Page already fully loaded — call init directly on next microtask.
  Promise.resolve().then(init);
} else {
  document.addEventListener("DOMContentLoaded", () => init(), { once: true });
}

</script>

STORY.register("scene-03-revenue-arc", function (mount, data, scene) {
  mount.classList.add("naked");
  const records = data.datasets["revenue"];
  const ceos = data.datasets["ceos"];

  const width  = mount.clientWidth || 900, height = 520;
  const margin = { top: 70, right: 30, bottom: 50, left: 70 };
  const W = width - margin.left - margin.right;
  const H = height - margin.top - margin.bottom;

  const svg = d3.select(mount).append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .style("width", "100%").style("height", "auto");

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  const x = d3.scaleLinear().domain(d3.extent(records, d => d.year)).range([0, W]);
  const y = d3.scaleSqrt().domain([0, d3.max(records, d => d.revenue_b) * 1.05]).range([H, 0]);

  ceos.forEach(c => {
    const x0 = x(c.start), x1 = x(Math.min(c.end, 2024));
    g.append("rect").attr("x", x0).attr("y", 0).attr("width", x1-x0).attr("height", H)
      .attr("fill", c.color).attr("opacity", 0.10);
    g.append("text").attr("x", x0 + 6).attr("y", 14)
      .attr("font-family", "var(--font-mono)").attr("font-size", 10)
      .attr("fill", c.color).attr("font-weight", 600)
      .text(c.name.toUpperCase() + " · " + c.start);
  });

  const area = d3.area().x(d => x(d.year)).y0(H).y1(d => y(d.revenue_b)).curve(d3.curveMonotoneX);
  g.append("path").datum(records).attr("d", area).attr("fill", "#0078D4").attr("opacity", 0.16);
  const line = d3.line().x(d => x(d.year)).y(d => y(d.revenue_b)).curve(d3.curveMonotoneX);

  const flag = (year, label, dy = -8) => {

      .attr("text-anchor", "middle").attr("font-family", "var(--font-mono)")
      .attr("font-size", 10).attr("fill", "#1F1F1F").text(label);
  };
  flag(1995, "Win 95", -10);
  flag(2000, "DOJ", -14);
  flag(2008, "Azure", -22);
  flag(2014, "Nadella", -10);

  root.appendChild(shell);

  const cont = document.createElement("div");
  cont.style.cssText = "max-width:80rem;margin:0 auto;padding:0 1.5rem;";
  shell.appendChild(cont);

  // Ridgeline with KDE-ish smooth per category
  const cats = ["Languages","OS","Productivity","Web","Mobile","Gaming","Developer","Hardware","Cloud","AI","Consumer"];
  const yearMin = 1975, yearMax = 2026;
  const W = 1100, rowH = 50, H = cats.length * rowH + 60;

  const svg = d3.select(cont).append("svg")
    .attr("viewBox", `0 0 ${W} ${H}`).style("width","100%").style("height","auto");

  const x = d3.scaleLinear().domain([yearMin, yearMax]).range([60, W - 20]);

  // year axis
  svg.append("g").attr("transform", `translate(0,${H - 30})`)
    .call(d3.axisBottom(x).ticks(10).tickFormat(d3.format("d")))
    .call(g => g.selectAll("text").attr("font-family", "var(--font-mono)").attr("font-size", 10));

  cats.forEach((cat, i) => {
    const events = recs.filter(d => d.category === cat).map(d => d.year);
    const y0 = 30 + i * rowH;
    // Density grid
    const samples = [];
    for (let yr = yearMin; yr <= yearMax; yr += 0.5) {
      const k = events.reduce((s, e) => s + Math.exp(-Math.pow(yr - e, 2) / 8), 0);
      samples.push({ yr, k });
    }
    const maxK = d3.max(samples, d => d.k) || 0.001;
    const yScale = d3.scaleLinear().domain([0, maxK]).range([0, rowH * 0.85]);
    const area = d3.area()
      .x(d => x(d.yr))
      .y0(y0 + rowH * 0.9)
      .y1(d => y0 + rowH * 0.9 - yScale(d.k))
      .curve(d3.curveBasis);
    const color = ["#F25022","#7FBA00","#00A4EF","#FFB900","#0078D4","#5C2D91","#008272"][i % 7];
    svg.append("path").datum(samples).attr("d", area)
      .attr("fill", color).attr("opacity", 0.35)
      .attr("stroke", color).attr("stroke-width", 1.2);
    // Category label
    svg.append("text").attr("x", 10).attr("y", y0 + rowH * 0.7)
      .attr("font-family", "var(--font-mono)").attr("font-size", 11)
      .attr("fill", "#1F1F1F").text(cat);
    // Tick marks for each event
    events.forEach(e => {
      svg.append("line")
        .attr("x1", x(e)).attr("x2", x(e))
        .attr("y1", y0 + rowH * 0.9).attr("y2", y0 + rowH * 0.9 + 4)

STORY.register("scene-26-3d-azure-cube", function (root, data, scene) {
  root.innerHTML = "";
  const shell = document.createElement("div");
  shell.className = "ms-shell";
  shell.innerHTML = `
    <div class="ms-eyebrow">2010–2024 · One region, drawn in three dimensions</div>
    <h2 class="ms-headline">A region is a cluster of data centers that look like, well, this.</h2>
    <p class="ms-deck">Each cube is a server rack column — a real Azure region has thousands. The 44 announced regions hold an order of magnitude more compute than every PC sold in 1995 combined. Drag to rotate.</p>
  `;
  root.appendChild(shell);
  const cont = document.createElement("div");
  cont.style.cssText = "max-width:60rem;margin:0 auto;padding:0 1.5rem;aspect-ratio:16/10;position:relative;";
  shell.appendChild(cont);
  const status = document.createElement("div");
  status.style.cssText = "position:absolute;bottom:8px;right:12px;font-family:var(--font-mono);font-size:10px;color:#605E5C;z-index:2;";
  status.textContent = "loading three.js…";
  cont.appendChild(status);

  let scene3d, camera, renderer, group, raf;
  let isDown = false, prevX = 0, autoSpin = true;

  function init3D() {
    const W = cont.clientWidth, H = cont.clientHeight;
    scene3d = new THREE.Scene();
    scene3d.background = null;
    camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
    camera.position.set(8, 6, 10);
    camera.lookAt(0, 1, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 0);
    cont.appendChild(renderer.domElement);

    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(4, 6, 4); scene3d.add(key);
    const fill = new THREE.DirectionalLight(0x00A4EF, 0.6);
    fill.position.set(-4, 2, -3); scene3d.add(fill);
    scene3d.add(new THREE.AmbientLight(0xffffff, 0.35));

    group = new THREE.Group();
    // 8x8 grid of "racks"
    const rackColors = [0xF25022, 0x7FBA00, 0x00A4EF, 0xFFB900];
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j < 8; j++) {
        const h = 1.2 + Math.random() * 2.0;
        const geom = new THREE.BoxGeometry(0.6, h, 0.6);
        const mat = new THREE.MeshStandardMaterial({
          color: rackColors[(i+j) % 4],
          metalness: 0.4, roughness: 0.55,
        });
        const m = new THREE.Mesh(geom, mat);
        m.position.set(i - 3.5, h/2, j - 3.5);
        group.add(m);
      }
    }
    // Floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 12),
      new THREE.MeshStandardMaterial({ color: 0xE1DFDD, metalness: 0.05, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI/2;
    group.add(floor);
    scene3d.add(group);

    function loop() {
      if (autoSpin) group.rotation.y += 0.004;
      renderer.render(scene3d, camera);
      raf = requestAnimationFrame(loop);
    }
    loop();
    status.textContent = "drag to rotate · auto-spinning";

    cont.addEventListener("pointerdown", e => { isDown = true; prevX = e.clientX; autoSpin = false; });
    window.addEventListener("pointerup", () => { isDown = false; });
    window.addEventListener("pointermove", e => {
      if (!isDown) return;
      const dx = (e.clientX - prevX) * 0.01;
      group.rotation.y += dx;
      prevX = e.clientX;
    });
    window.addEventListener("resize", () => {
      const W2 = cont.clientWidth, H2 = cont.clientHeight;
      renderer.setSize(W2, H2);
      camera.aspect = W2/H2; camera.updateProjectionMatrix();
    });
  }
  function ensureThree() {
    if (window.THREE) { init3D(); return; }
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js";
    s.onload = init3D;
    s.onerror = () => { status.textContent = "(three.js failed to load)"; };
    document.head.appendChild(s);
  }
  ensureThree();
});

</script>

  const caps     = ["Chat","Summarize","Generate text","Generate code","Generate image","Search","Translate"];

  // Hand-curated matrix — 1 if cap is shipping in surface (as of 2024-Q4)
  const M = {
    "Word":        ["Chat","Summarize","Generate text","Translate"],
    "Excel":       ["Chat","Summarize","Generate text"],

    "GitHub":      ["Chat","Generate code"],
    "VS Code":     ["Chat","Generate code"],
    "Azure":       ["Chat","Generate text","Generate code"],
    "Power BI":    ["Chat","Summarize","Generate text"],
  };

  const W = 720, H = 540, R = 200;
  const svg = d3.select(cont).append("svg").attr("viewBox", `0 0 ${W} ${H}`)
    .style("width","100%").style("height","auto");
  const g = svg.append("g").attr("transform", `translate(${W/2},${H/2 + 10})`);

  const items = [...surfaces, ...caps]; // ring positions
  const N = items.length;
  const angle = (i) => (i / N) * Math.PI * 2 - Math.PI/2;

  // Color: surface = blue family, cap = colored
  const capColor = {
    "Chat":"#0078D4","Summarize":"#7FBA00","Generate text":"#FFB900",
    "Generate code":"#5C2D91","Generate image":"#F25022","Search":"#00A4EF","Translate":"#008272",
  };

  // Outer ring labels + tick
  items.forEach((it, i) => {
    const a = angle(i);
    const x1 = Math.cos(a) * R, y1 = Math.sin(a) * R;
    const x2 = Math.cos(a) * (R + 6), y2 = Math.sin(a) * (R + 6);
    const x3 = Math.cos(a) * (R + 12), y3 = Math.sin(a) * (R + 12);
    const isCap = caps.includes(it);
    g.append("line").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
      .attr("stroke", isCap ? (capColor[it] || "#1F1F1F") : "#0078D4").attr("stroke-width", 2);
    g.append("text").attr("x", x3).attr("y", y3)
      .attr("text-anchor", Math.cos(a) > 0.05 ? "start" : (Math.cos(a) < -0.05 ? "end" : "middle"))
      .attr("dy", Math.sin(a) > 0.4 ? "0.7em" : (Math.sin(a) < -0.4 ? "-0.2em" : "0.35em"))

      const j = items.indexOf(c);
      const a1 = angle(i), a2 = angle(j);
      const x1 = Math.cos(a1) * R, y1 = Math.sin(a1) * R;
      const x2 = Math.cos(a2) * R, y2 = Math.sin(a2) * R;
      const path = `M${x1},${y1} Q0,0 ${x2},${y2}`;
      g.append("path").attr("d", path).attr("fill","none")
        .attr("stroke", capColor[c]).attr("stroke-width", 1.5).attr("opacity", 0.32);
    });
  });

  // Centre legend
  g.append("text").attr("text-anchor","middle").attr("font-family","var(--font-mono)")
    .attr("font-size",11).attr("fill","#605E5C").text("12 surfaces · 7 capabilities");

  `;
  root.appendChild(shell);

  const cont = document.createElement("div");
  cont.style.cssText = "max-width:60rem;margin:0 auto 3rem;padding:0 1.5rem;";
  shell.appendChild(cont);

  // Compute YoY growth
  const enriched = rev.map((r, i) => ({
    ...r,
    growth: i === 0 ? null : (r.revenue_b / rev[i-1].revenue_b - 1) * 100,
  }));
  const maxRev = d3.max(enriched, d => d.revenue_b);

  let sortKey = "year", sortDir = 1;
  function sortAndRender() {
    const sorted = [...enriched].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "string") return sortDir * av.localeCompare(bv);
      return sortDir * (av - bv);
    });
    body.innerHTML = "";
    sorted.forEach(r => {
      const tr = document.createElement("div");
      tr.style.cssText = "display:grid;grid-template-columns:6ch 14ch 1fr 14ch 8ch;gap:1rem;padding:0.5rem 0;border-bottom:1px solid #F5F5F5;align-items:center;font-family:var(--font-mono);font-size:12px;";
      const growthColor =
        r.growth == null ? "#A19F9D" :
        r.growth >= 15 ? "#7FBA00" :
        r.growth < 0 ? "#F25022" :
        r.growth < 5 ? "#A19F9D" : "#1F1F1F";
      tr.innerHTML = `
        <div>${r.year}</div>
        <div style="color:${ceoColor[r.ceo] || '#605E5C'};font-weight:600;">${r.ceo.split(" ")[0]}</div>
        <div style="position:relative;height:14px;background:#F5F5F5;">
          <div style="position:absolute;inset:0;background:#0078D4;width:${(r.revenue_b/maxRev*100).toFixed(2)}%;opacity:0.55;"></div>
        </div>
        <div style="text-align:right;font-weight:600;color:#1F1F1F;">$${r.revenue_b < 1 ? r.revenue_b.toFixed(3) : r.revenue_b.toFixed(2)}B</div>
        <div style="text-align:right;color:${growthColor};">${r.growth == null ? "—" : (r.growth >= 0 ? "+" : "") + r.growth.toFixed(1) + "%"}</div>
      `;
      body.appendChild(tr);
    });
  }

  const head = document.createElement("div");
  head.style.cssText = "display:grid;grid-template-columns:6ch 14ch 1fr 14ch 8ch;gap:1rem;padding:0.75rem 0;border-bottom:2px solid #1F1F1F;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#605E5C;cursor:pointer;";
  ["year","ceo","revenue_b","revenue_b","growth"].forEach((key, i) => {
    const labels = ["Year","CEO","Revenue (bar)","Revenue ($B)","YoY"];
    const align = (i === 3 || i === 4) ? "right" : "left";
    const c = document.createElement("div");
    c.style.textAlign = align;
    c.textContent = labels[i];
    c.addEventListener("click", () => {
      if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
      sortAndRender();
    });
    head.appendChild(c);
  });
  cont.appendChild(head);
  const body = document.createElement("div");
  cont.appendChild(body);
  sortAndRender();
});

  cats.forEach((cat, ci) => {

      .attr("text-anchor","end").attr("font-family","var(--font-mono)").attr("font-size", 11)
      .attr("fill","#1F1F1F").text(cat);
    years.forEach((y, yi) => {
      const cnt = recs.filter(r => r.year === y && r.category === cat).length;
      const fill = cnt === 0 ? "#F5F5F5"
                  : cnt === 1 ? "#0078D4"
                  : cnt === 2 ? "#F25022"
                  :              "#7FBA00";
      svg.append("rect")
        .attr("x", padL + yi * cellW - cellW/2).attr("y", padT + ci * cellH)
        .attr("width", cellW - 2).attr("height", cellH - 2)
        .attr("fill", fill).attr("opacity", cnt === 0 ? 1 : 0.85)
        .append("title").text(cnt === 0 ? `${cat} · ${y}` : recs.filter(r => r.year === y && r.category === cat).map(r => r.name).join(", "));
    });
  });

  // Legend
  const lg = svg.append("g").attr("transform", `translate(${padL}, ${H - 20})`);
  ["0 launches","1","2","3+"].forEach((lbl, i) => {
    const colors = ["#F5F5F5","#0078D4","#F25022","#7FBA00"];
    lg.append("rect").attr("x", i * 110).attr("width", 14).attr("height", 14).attr("fill", colors[i]).attr("opacity", i === 0 ? 1 : 0.85);
    lg.append("text").attr("x", i*110 + 20).attr("y", 11)
      .attr("font-family","var(--font-mono)").attr("font-size", 10).text(lbl);
  });
});

</script>

STORY.register("scene-37-decade-fingerprints", function (root, data, scene) {
  root.innerHTML = "";
  const recs = data.datasets["products"];

  const shell = document.createElement("div");
  shell.className = "ms-shell";
  shell.innerHTML = `
    <div class="ms-eyebrow">Each decade as a category mix</div>
    <h2 class="ms-headline">What every decade was about, at a glance.</h2>
    <p class="ms-deck">Each panel is one decade. The radial spokes are categories; the length of the spoke is the count of named launches in that category that decade. The 80s and 90s are OS-shaped. The 2010s are a balanced star. The 2020s already show an AI bias.</p>
  `;
  root.appendChild(shell);

  const decades = [
    [1975, 1979, "Late 70s"],
    [1980, 1989, "1980s"],
    [1990, 1999, "1990s"],
    [2000, 2009, "2000s"],
    [2010, 2019, "2010s"],
    [2020, 2024, "2020s"],
  ];
  const cats = ["OS","Productivity","Developer","Cloud","Web","Mobile","Gaming","Hardware","AI","Consumer","Languages"];
  const colors = ["#F25022","#7FBA00","#00A4EF","#FFB900","#0078D4","#5C2D91","#008272","#1F1F1F","#F25022","#7FBA00","#00A4EF"];

  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:80rem;margin:0 auto 4rem;padding:0 1.5rem;";
  shell.appendChild(grid);

  decades.forEach(([s, e, label]) => {
    const counts = cats.map(c => recs.filter(r => r.year >= s && r.year <= e && r.category === c).length);
    const maxC = d3.max(counts);
    const card = document.createElement("div");
    card.style.cssText = "background:white;border:1px solid var(--rule);padding:1rem;display:grid;place-items:center;";
    const W = 240, H = 240;
    const svg = d3.select(card).append("svg").attr("viewBox", `0 0 ${W} ${H}`).style("width","100%");
    const cx = W/2, cy = H/2 + 8;
    const R = 90;
    // Spokes
    counts.forEach((cnt, i) => {
      const a = (i / cats.length) * Math.PI * 2 - Math.PI/2;
      const r = (cnt / Math.max(1, maxC)) * R;
      svg.append("line").attr("x1", cx).attr("y1", cy)
        .attr("x2", cx + Math.cos(a)*r).attr("y2", cy + Math.sin(a)*r)
        .attr("stroke", colors[i]).attr("stroke-width", 2).attr("opacity", cnt > 0 ? 0.9 : 0.1);
      if (cnt > 0) {
        svg.append("circle").attr("cx", cx + Math.cos(a)*r).attr("cy", cy + Math.sin(a)*r)
          .attr("r", 3 + cnt).attr("fill", colors[i]).attr("opacity", 0.7);
      }
    });
    // Total count
    svg.append("text").attr("x", cx).attr("y", cy - 4).attr("text-anchor","middle")
      .attr("font-family","var(--font-display)").attr("font-weight",800)
      .attr("font-size", 28).attr("fill","#1F1F1F")
      .text(d3.sum(counts));
    svg.append("text").attr("x", cx).attr("y", cy + 14).attr("text-anchor","middle")
      .attr("font-family","var(--font-mono)").attr("font-size", 10).attr("fill","#605E5C").text("launches");
    svg.append("text").attr("x", W/2).attr("y", H - 8).attr("text-anchor","middle")
      .attr("font-family","var(--font-mono)").attr("font-size", 11).attr("fill","#1F1F1F").attr("font-weight",600)
      .text(label);
    grid.appendChild(card);
  });
});

</script>

STORY.register("scene-38-bet-sizes", function (root, data, scene) {
  root.innerHTML = "";
  const acqs = data.datasets["acquisitions"];
  const gaming = acqs.filter(a => a.category === "Gaming");
  const allPriorGaming = gaming.filter(a => a.year < 2023);
  const activision = gaming.find(a => a.name.startsWith("Activision"));
  const totalPrior = allPriorGaming.reduce((s, a) => s + a.price_b, 0);

  const shell = document.createElement("div");
  shell.className = "ms-shell";
  shell.innerHTML = `
    <div class="ms-eyebrow">2023 · The Activision close</div>
    <h2 class="ms-headline">Activision (2023) cost ${(activision.price_b / totalPrior).toFixed(1)}× every prior gaming acquisition combined.</h2>
    <p class="ms-deck">Microsoft's gaming spending was a slow drip until it wasn't. Mojang ($2.5B, 2014) was a big bet at the time. ZeniMax ($7.5B, 2021) was bigger. Activision dwarfs both — and is the largest software acquisition in history outside Discord-of-Discords speculative territory.</p>
  `;
  root.appendChild(shell);

  const cont = document.createElement("div");
  cont.style.cssText = "max-width:60rem;margin:0 auto 4rem;padding:0 1.5rem;display:flex;gap:3rem;align-items:center;justify-content:center;flex-wrap:wrap;";
  shell.appendChild(cont);

  // Two big circles, area-proportional
  const r1 = Math.sqrt(totalPrior) * 18;
  const r2 = Math.sqrt(activision.price_b) * 18;
  cont.innerHTML += `
    <div style="text-align:center;">
      <svg viewBox="-${r1+10} -${r1+10} ${(r1+10)*2} ${(r1+10)*2}" style="width:${r1*1.6}px;height:${r1*1.6}px;display:block;margin:0 auto;">
        <circle r="${r1}" fill="#7FBA00" opacity="0.7" />
        <text text-anchor="middle" dy="-0.3em" font-family="var(--font-display)" font-weight="800" font-size="18" fill="white">$${totalPrior.toFixed(1)}B</text>
        <text text-anchor="middle" dy="1.0em" font-family="var(--font-mono)" font-size="10" fill="white">all prior gaming</text>
      </svg>
      <div style="font-family:var(--font-mono);font-size:11px;color:#605E5C;margin-top:0.5rem;">Mojang + ZeniMax</div>
    </div>
    <div style="text-align:center;">
      <svg viewBox="-${r2+10} -${r2+10} ${(r2+10)*2} ${(r2+10)*2}" style="width:${r2*1.4}px;height:${r2*1.4}px;display:block;margin:0 auto;">
        <circle r="${r2}" fill="#0078D4" opacity="0.85" />
        <text text-anchor="middle" dy="-0.4em" font-family="var(--font-display)" font-weight="800" font-size="38" fill="white">$${activision.price_b}B</text>
        <text text-anchor="middle" dy="1.2em" font-family="var(--font-mono)" font-size="11" fill="white">Activision Blizzard</text>
      </svg>
      <div style="font-family:var(--font-mono);font-size:11px;color:#605E5C;margin-top:0.5rem;">2023</div>
    </div>
  `;
});

</script>
