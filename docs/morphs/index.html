/* story.css — layout, scrollytelling mechanics, typography. Theme tokens come from theme.css. */

* { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: var(--step-0);
  line-height: 1.55;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

/* ---------- skip link (visible only on keyboard focus) ---------- */
.skip-link {
  position: fixed;
  top: -100px; left: 1rem;
  z-index: 10000;
  background: var(--accent);
  color: var(--ink-invert);
  padding: 0.5rem 1rem;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: var(--step--1);
  text-decoration: none;
  transition: top 150ms ease;
}
.skip-link:focus { top: 1rem; }

/* ---------- reading progress (scroll mode) ---------- */
.progress-rail {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  z-index: 9999;
  pointer-events: none;
}
.progress-rail__fill {
  height: 100%;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: 0 50%;
}
body.story-mode--slides .progress-rail { display: none; }

/* ---------- atmosphere overlays ---------- */
.atmosphere { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }
.atmosphere--grain {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity: var(--grain-opacity, 0);
  mix-blend-mode: overlay;
}
.atmosphere--vignette {

}

/* ---------- hero ---------- */
.hero {
  position: relative;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 4rem 1.5rem;
  overflow: hidden;
}
.hero__bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, color-mix(in oklch, var(--accent) 12%, transparent), transparent 55%),
    radial-gradient(circle at 80% 70%, color-mix(in oklch, var(--accent-2) 10%, transparent), transparent 55%);
  opacity: 0.9;
}
/* Full-bleed hero image (meta.hero_image; story.js sets background-image).
   The scrim keeps the headline legible against any photo, in any theme. */
.hero__bg--image {
  background-size: cover;
  background-position: center;
}
.hero__bg--image::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(
    color-mix(in srgb, var(--bg) 55%, transparent),
    color-mix(in srgb, var(--bg) 80%, transparent));
}
.hero__inner {
  position: relative;
  max-width: 50rem;
  text-align: left;
}
.hero__eyebrow {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 1.5rem;
}
.hero__headline {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--step-4);
  line-height: 1.02;
  letter-spacing: -0.015em;
  margin: 0 0 1.25rem;
  text-wrap: balance;
}
.hero__deck {
  font-size: var(--step-1);
  color: var(--ink-soft);
  max-width: 42ch;
  margin: 0 0 2.5rem;
  text-wrap: pretty;
}
.hero__byline {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  display: flex;
  gap: 1rem;
  align-items: center;
}
.hero__byline > * + *::before { content: "·"; margin-right: 0.5em; opacity: 0.6; }
.hero__scrollcue {
  position: absolute;
  bottom: 2rem; left: 1.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  letter-spacing: 0.14em; text-transform: uppercase;
  animation: cue 2.4s ease-in-out infinite;
}
@keyframes cue { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

/* ---------- main story column / scenes ---------- */
.story {
  display: flex;
  flex-direction: column;
  gap: 6rem;
  padding: 6rem 0;
}
.scene { padding: 0 1.5rem; }

/* Simple scene: a single chart-driven moment, centered column. */
.scene--simple {
  max-width: 56rem;
  margin: 0 auto;
}
.scene--simple h2 {
  font-family: var(--font-display);
  font-size: var(--step-2);
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0 0 0.75rem;
  text-wrap: balance;
}
.scene--simple > p {
  font-size: var(--step-0);
  color: var(--ink-soft);
  margin: 0 0 2rem;
  max-width: 42ch;
  text-wrap: pretty;
}
.scene--simple .scene__graphic {
  background: var(--bg-elev);
  border-radius: 4px;
  padding: 1.5rem;
  min-height: 300px;
}

/* Custom scene: chrome-free. The renderer owns the entire <section>.
   No max-width, no padding, no .scene__graphic wrapper. */
.scene--custom {
  padding: 0;
}

/* Per-scene width modifiers (set via Scene.width in data.json).
   Override the default ~56rem max-width of simple scenes (and any other
   width-respecting scene kind). */
.scene--w-narrow { max-width: 36rem; margin: 0 auto; }
.scene--w-wide   { max-width: 78rem; margin: 0 auto; }
.scene--w-full {
  max-width: none;
  margin: 0;
  padding-left: 0;
  padding-right: 0;
  width: 100%;
}

/* Scrollytelling: sticky graphic + stepping text */
.scene--scrolly {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
  max-width: 80rem;
  margin: 0 auto;
}
.scene--scrolly .scene__graphic {
  position: sticky;
  top: 10vh;
  height: 80vh;
  display: grid;
  place-items: center;
  background: var(--bg-elev);
  border-radius: 4px;
  padding: 1.5rem;
}
.scene--scrolly .scene__graphic svg { max-width: 100%; height: 100%; }

/* Vizzu scenes share the scrolly grid but need a full-bleed canvas (not centered). */
.scene--vizzu .scene__graphic {
  display: block;
  place-items: initial;
  padding: 0.5rem;
  overflow: hidden;
}
.scene--vizzu .scene__graphic > canvas { width: 100% !important; height: 100% !important; }
.scene--vizzu__headline {
  font-family: var(--font-display);
  font-size: var(--step-1);
  letter-spacing: -0.01em;
  margin: 0 0 1.5rem;
  color: var(--ink-soft);
}
.scene--scrolly .scene__text { display: flex; flex-direction: column; gap: 0; }
.scene--scrolly .step {
  min-height: 90vh;
  padding: 30vh 0;
  opacity: 0.45;
  transition: opacity 400ms var(--easing-out);
}
.scene--scrolly .step.is-active { opacity: 1; }
.scene--scrolly .step h3 {
  font-family: var(--font-display);
  font-size: var(--step-2);
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0 0 0.75rem;
  text-wrap: balance;
}
.scene--scrolly .step p {
  font-size: var(--step-0);
  color: var(--ink-soft);
  margin: 0;
  max-width: 38ch;
  text-wrap: pretty;
}

/* Full-bleed cinematic */
.scene--bleed {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: var(--bg-deep);
  color: var(--ink-invert);
  position: relative;
  overflow: hidden;
}
.scene--bleed .scene__bleedbg {
  position: absolute; inset: 0;
  z-index: 0;
}
.scene--bleed .scene__bleedinner {
  position: relative; z-index: 1;
  max-width: 36rem; padding: 4rem 1.5rem;
  text-align: center;
}
.scene--bleed h2 {
  font-family: var(--font-display);
  font-size: var(--step-3);
  margin: 0 0 1rem;
  line-height: 1.05;
  text-wrap: balance;
}
.scene--bleed p {
  font-size: var(--step-1);
  margin: 0;
  opacity: 0.85;
  text-wrap: pretty;
}

/* Pinned reveal: one full-viewport object, scroll-progress driven */
.scene--pinned {
  position: relative;
  height: 300vh;            /* tall section so scroll can drive progress */
}
.scene--pinned .scene__pin {
  position: sticky;
  top: 0;
  height: 100vh;
  display: grid;
  place-items: center;
}

/* Inline annotation typography (used by D3 callouts) */
.annotation {
  font-family: var(--font-mono);
  font-size: 11px;
  fill: var(--ink-soft);
  pointer-events: none;
}
.annotation--strong { fill: var(--accent); font-weight: 600; }

/* Source line under each scene with data */
.scene__source {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  margin: 1.5rem 0 0;
}

/* ---------- outro ---------- */
.outro { padding: 6rem 1.5rem; background: var(--bg-elev); border-top: 1px solid var(--rule); }
.outro__inner { max-width: 50rem; margin: 0 auto; }
.outro__title {
  font-family: var(--font-display);
  font-size: var(--step-2);
  margin: 0 0 1.5rem;
}
.outro__sources { list-style: none; padding: 0; margin: 0 0 2rem; display: grid; gap: 0.75rem; }
.outro__sources a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
.outro__sources a:hover { color: var(--accent); }
.outro__credits {
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-faint);
  margin: 0;
}

/* ---------- responsive ---------- */
@media (max-width: 720px) {
  .scene--scrolly { grid-template-columns: 1fr; gap: 0; }
  .scene--scrolly .scene__graphic { height: 60vh; top: 18vh; }
  .scene--scrolly .step { min-height: 70vh; padding: 6vh 0; }
  .hero__headline { font-size: var(--step-3); }
  .hero { padding: 3rem 1.25rem; }
}

/* ---------- slides mode (meta.mode === "slides") ---------- */
html.story-mode--slides,
body.story-mode--slides {
  height: 100vh;
  overflow: hidden;
  margin: 0;
}

/* The story container becomes a slide stage; hero/scenes/outro are layered slides. */
body.story-mode--slides #story {
  display: contents;
  padding: 0;
  gap: 0;
}

body.story-mode--slides .hero,
body.story-mode--slides .scene,
body.story-mode--slides .outro {
  position: absolute;
  inset: 0;
  margin: 0;
  width: 100vw;
  height: 100vh;
  opacity: 0;
  pointer-events: none;
  overflow: auto;             /* in case content is taller than viewport */
  transition: opacity 250ms var(--easing-out, ease);
  z-index: 1;
}
body.story-mode--slides .is-current {
  opacity: 1;
  pointer-events: auto;
  z-index: 2;
}

/* Hero in slide mode: hide the scroll cue (no scrolling here). */
body.story-mode--slides .hero__scrollcue { display: none; }

/* Scrolly scenes in slide mode: become a 2-column static layout, only
   the active step's text panel is visible. The chart is no longer sticky. */
body.story-mode--slides .scene--scrolly {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 4rem;
  padding: 4rem 3rem 6rem;
  max-width: 100%;
}
body.story-mode--slides .scene--scrolly .scene__graphic {
  position: relative;
  top: 0;
  height: 70vh;
  max-height: 70vh;
}
body.story-mode--slides .scene--scrolly .step {
  display: none;
  min-height: auto;
  padding: 0;
  opacity: 1;
}
body.story-mode--slides .scene--scrolly .step.is-active {
  display: block;
}

/* Vizzu scenes share the scrolly layout treatment in slides mode. */
body.story-mode--slides .scene--vizzu .scene__graphic { padding: 0.25rem; }
body.story-mode--slides .scene--vizzu__headline { display: none; }  /* the per-step headline is enough in slides */

/* Simple scene in slides mode: vertically center the content column.
   Flexbox is more reliable than grid+align-content for auto-sized children. */
body.story-mode--slides .scene--simple {
  padding: 4rem 3rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  max-width: none;
  margin: 0;
}
body.story-mode--slides .scene--simple > * {
  max-width: 64rem;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}

/* Bleed in slides mode is already viewport-filling; just no extra padding. */
body.story-mode--slides .scene--bleed { padding: 0; }

/* Outro in slides mode: center the source list. */
body.story-mode--slides .outro { display: grid; place-items: center; }

/* The slide controls bar */
.slide-controls {
  position: fixed;
  bottom: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 0.75rem;
  background: color-mix(in oklch, var(--bg-elev) 85%, transparent);
  backdrop-filter: blur(8px);
  border: 1px solid var(--rule);
  border-radius: 999px;
  z-index: 9000;
  font-family: var(--font-mono);
  font-size: var(--step--1);
  color: var(--ink-soft);
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
}
.slide-controls[hidden] { display: none; }
.slide-controls__btn {
  display: inline-grid;
  place-items: center;
  width: 32px; height: 32px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: background-color 150ms var(--easing-out, ease);
}
.slide-controls__btn:hover { background: color-mix(in oklch, var(--accent) 15%, transparent); color: var(--accent); }
.slide-controls__btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.slide-controls__btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.slide-controls__indicator {
  min-width: 4ch;
  text-align: center;
  letter-spacing: 0.04em;
  user-select: none;
}

/* In slides mode, hide the sources atmosphere bleeding behind the controls. */
body.story-mode--slides .atmosphere--vignette { opacity: 0.5; }

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
  .hero__scrollcue { animation: none; }
}

/* ---------- print (browser print → clean PDF handout) ---------- */
@media print {
  .atmosphere, .hero__scrollcue, .slide-controls, .progress-rail, .skip-link {
    display: none !important;
  }
  .hero, .scene--bleed { min-height: auto; }
  .scene--pinned { height: auto; }
  .scene--pinned .scene__pin { position: static; height: auto; }
  .scene--scrolly .scene__graphic { position: static; height: auto; }
  .scene--scrolly .step { min-height: auto; padding: 1rem 0; opacity: 1; }
  .scene, .step { break-inside: avoid; }
}

  <!-- Motion One + Vizzu: ESM-only on CDN. We bridge them to globals so the

  <!-- story.js (orchestration) and scenes (each calls window.STORY.register).

  <script>
// story.js — orchestration. Reads window.__STORY_DATA__ (injected at bundle time)
// or fetches data.json (dev mode), then builds scenes.
//
// Per-scene chart code lives in scenes/<scene-id>.js — author writes those.
// Each scene file calls window.STORY.register("scene-id", drawFn).
//
// Motion One is loaded via a tiny module-to-global wrapper in index.html
// and exposed on window.MOTION = { animate, stagger, inView, scroll }.
// (We avoid ES-module imports in this file so the bundled HTML works under
// the file:// protocol — browsers block cross-origin module fetches there.)

const SCENE_RENDERERS = {};

// Read Motion at call time, not at module-load — the ESM shim may not have
// resolved yet. Each call falls back to a no-op if Motion isn't ready.
const animate = (...args) => (window.MOTION?.animate || (() => {}))(...args);
const stagger = (...args) => (window.MOTION?.stagger || (() => 0))(...args);
const inView  = (target, fn, opts) =>
  (window.MOTION?.inView || ((t, f) => f({ target: t })))(target, fn, opts);

function register(id, fn) {
  SCENE_RENDERERS[id] = fn;
}
window.STORY = { register };

// Wait for Motion to load before init (so opening animations actually animate).
function waitForMotion(timeoutMs = 2500) {
  return new Promise(resolve => {
    if (window.MOTION) return resolve();
    const t = setTimeout(resolve, timeoutMs);  // proceed anyway after timeout
    const check = setInterval(() => {
      if (window.MOTION) { clearInterval(check); clearTimeout(t); resolve(); }
    }, 30);
  });
}

const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

async function getData() {
  if (window.__STORY_DATA__) return window.__STORY_DATA__;
  const res = await fetch("data.json");
  return res.json();
}

function el(tag, attrs = {}, ...kids) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null) continue;
    n.append(typeof k === "string" ? document.createTextNode(k) : k);
  }
  return n;
}

function renderHero(meta) {
  const h = document.querySelector(".hero");
  if (!h) return;
  if (meta.hero_image) {
    const bg = h.querySelector(".hero__bg");
    if (bg) {
      bg.classList.add("hero__bg--image");
      bg.style.backgroundImage = `url("${meta.hero_image}")`;
    }
  }
  h.querySelector(".hero__eyebrow").textContent = meta.subtitle || "";
  h.querySelector(".hero__headline").textContent = meta.title || "Untitled";
  h.querySelector(".hero__deck").textContent = meta.deck || "";
  h.querySelector(".hero__author").textContent = meta.author || "";
  h.querySelector(".hero__date").textContent = meta.published || "";

  if (!reduceMotion) {
    animate(
      [h.querySelector(".hero__eyebrow"), h.querySelector(".hero__headline"),
       h.querySelector(".hero__deck"), h.querySelector(".hero__byline")],
      { opacity: [0, 1], y: [16, 0] },
      { duration: 0.8, easing: [0.22, 1, 0.36, 1], delay: stagger(0.12, { start: 0.1 }) }
    );
  }
}

function renderSources(sources = [], meta = {}) {
  const ul = document.getElementById("sources");
  if (!ul) return;
  ul.replaceChildren(...sources.map(s => {
    const li = el("li");
    if (s.url) {
      li.append(el("a", { href: s.url, target: "_blank", rel: "noopener" }, s.name));
      if (s.accessed) li.append(el("span", { class: "outro__accessed" }, ` · accessed ${s.accessed}`));
    } else {
      li.textContent = s.name;
    }
    return li;
  }));
  const author = document.getElementById("credits-author");
  const pub = document.getElementById("credits-published");
  if (author) author.textContent = meta.author || "";
  if (pub) pub.textContent = meta.published || "";
}

function buildScene(scene) {
  let node;
  if (scene.kind === "scrolly")      node = buildScrollyScene(scene);
  else if (scene.kind === "bleed")   node = buildBleedScene(scene);
  else if (scene.kind === "pinned")  node = buildPinnedScene(scene);
  else if (scene.kind === "vizzu")   node = buildVizzuScene(scene);
  else if (scene.kind === "custom")  node = buildCustomScene(scene);
  else                                node = buildSimpleScene(scene);
  // Apply width modifier if set (default | narrow | wide | full)
  if (scene.width && scene.width !== "default") {
    node.classList.add("scene--w-" + scene.width);
  }
  // Text alternative for the chart (scene.alt) → expose the mount to
  // screen readers. Without it the chart is a silent <div> of SVG paths.
  if (scene.alt) {
    const mount = node.matches("[data-mount]") ? node : node.querySelector("[data-mount]");
    if (mount) {
      mount.setAttribute("role", "img");
      mount.setAttribute("aria-label", scene.alt);
    }
  }
  return node;
}

function buildSimpleScene(scene) {
  const wrap = el("section", { class: "scene scene--simple", "data-scene": scene.id, id: scene.id });
  if (scene.chrome !== false) {
    wrap.append(el("h2", {}, scene.headline || ""));
    if (scene.commentary) wrap.append(el("p", {}, scene.commentary));
  }
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  if (scene.chrome !== false && scene.source_line) {
    wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  }
  return wrap;
}

function buildCustomScene(scene) {
  // Chrome-free: no h2, no p, no .scene__graphic wrapper. The renderer gets
  // the full <section> as its mount and owns the entire DOM. Use for
  // typography animations, bespoke layouts, embedded interactives, etc.
  const wrap = el("section", {
    class: "scene scene--custom", "data-scene": scene.id, id: scene.id, "data-mount": scene.id,
  });
  return wrap;
}

function buildScrollyScene(scene) {
  const wrap = el("section", { class: "scene scene--scrolly", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  const text = el("div", { class: "scene__text" });
  (scene.steps || []).forEach((step, i) => {
    const s = el("div", { class: "step", "data-step": String(i) });
    s.append(el("h3", {}, step.headline || ""));
    if (step.commentary) s.append(el("p", {}, step.commentary));
    text.append(s);
  });
  wrap.append(text);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function buildBleedScene(scene) {
  const wrap = el("section", { class: "scene scene--bleed", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__bleedbg", "data-mount": scene.id }));
  const inner = el("div", { class: "scene__bleedinner" });
  inner.append(el("h2", {}, scene.headline || ""));
  if (scene.commentary) inner.append(el("p", {}, scene.commentary));
  wrap.append(inner);
  return wrap;
}

function buildPinnedScene(scene) {
  const wrap = el("section", { class: "scene scene--pinned", "data-scene": scene.id, id: scene.id });
  const pin = el("div", { class: "scene__pin", "data-mount": scene.id });
  wrap.append(pin);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function buildVizzuScene(scene) {
  // Same shape as scrolly: sticky chart + stepping text. The chart is a Vizzu
  // canvas that morphs between frames on each step.
  const wrap = el("section", { class: "scene scene--scrolly scene--vizzu", "data-scene": scene.id, id: scene.id });
  wrap.append(el("div", { class: "scene__graphic", "data-mount": scene.id }));
  const text = el("div", { class: "scene__text" });
  if (scene.headline) {
    const heading = el("h3", { class: "scene--vizzu__headline" }, scene.headline);
    text.append(heading);
  }
  (scene.frames || []).forEach((frame, i) => {
    const s = el("div", { class: "step", "data-step": String(i) });
    s.append(el("h3", {}, frame.headline || ""));
    if (frame.commentary) s.append(el("p", {}, frame.commentary));
    text.append(s);
  });
  wrap.append(text);
  if (scene.source_line) wrap.append(el("p", { class: "scene__source" }, scene.source_line));
  return wrap;
}

function activateScrollyScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const ctrl = renderer(mount, data, scene); // expected to return { onStep(i, dir) } or null
  if (slidesMode) return ctrl;  // slides controller drives onStep

  const scroller = scrollama();
  scroller.setup({
    step: sceneEl.querySelectorAll(".step"),
    offset: 0.5,
    debug: false,
  }).onStepEnter(({ element, index, direction }) => {
    element.classList.add("is-active");
    if (ctrl && typeof ctrl.onStep === "function") ctrl.onStep(index, direction);
  }).onStepExit(({ element, direction }) => {
    if (direction === "up") element.classList.remove("is-active");
  });

  window.addEventListener("resize", () => scroller.resize());
  return ctrl;
}

function activateBleedScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (renderer) {
    const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
    renderer(mount, data, scene);
  }
  if (slidesMode || reduceMotion) return null;  // slides controller handles entry; CSS drives the rest
  inView(sceneEl, () => {
    animate(
      [sceneEl.querySelector("h2"), sceneEl.querySelector("p")].filter(Boolean),
      { opacity: [0, 1], y: [12, 0] },
      { duration: 0.7, easing: [0.22, 1, 0.36, 1], delay: stagger(0.12, { start: 0.1 }) }
    );
  }, { margin: "0px 0px -25% 0px" });
  return null;
}

function activatePinnedScene(sceneEl, scene, data, slidesMode = false) {
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const ctrl = renderer(mount, data, scene);
  if (!ctrl || typeof ctrl.onProgress !== "function") return ctrl;
  if (slidesMode) {
    // Pinned scenes are scroll-progress driven; in slides mode, show end state.
    ctrl.onProgress(1);
    return ctrl;
  }

  // Use IntersectionObserver + requestAnimationFrame for progress 0..1
  let raf = null;
  const update = () => {
    const r = sceneEl.getBoundingClientRect();
    const total = r.height - window.innerHeight;
    const p = Math.min(1, Math.max(0, -r.top / total));
    ctrl.onProgress(p);
    raf = null;
  };
  const onScroll = () => { if (!raf) raf = requestAnimationFrame(update); };
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);
  update();
  return ctrl;
}

function revealOnEnter(sceneEl) {
  // Gentle entry reveal for simple scenes (headline → commentary → chart).
  // Skipped under prefers-reduced-motion; harmless no-op if Motion is absent.
  if (reduceMotion) return;
  const targets = [
    sceneEl.querySelector(":scope > h2"),
    sceneEl.querySelector(":scope > p"),
    sceneEl.querySelector(".scene__graphic"),
  ].filter(Boolean);
  if (!targets.length) return;
  inView(sceneEl, () => {
    animate(
      targets,
      { opacity: [0, 1], y: [14, 0] },
      { duration: 0.65, easing: [0.22, 1, 0.36, 1], delay: stagger(0.1) }
    );
  }, { margin: "0px 0px -18% 0px" });
}

function activateSimpleScene(sceneEl, scene, data, slidesMode = false) {
  if (!slidesMode) revealOnEnter(sceneEl);
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) return null;
  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  // Render immediately. Renderer may use inView internally for entry animations.
  return renderer(mount, data, scene);
}

function activateCustomScene(sceneEl, scene, data, slidesMode = false) {
  // The section IS the mount. The renderer owns the entire DOM and is free to
  // build any layout, including reading scene.headline / scene.commentary /
  // scene.source_line itself if it wants to display them.
  const renderer = SCENE_RENDERERS[scene.id];
  if (!renderer) {
    console.warn(`[dstory] kind:"custom" scene "${scene.id}" has no registered renderer.`);
    return null;
  }
  return renderer(sceneEl, data, scene);
}

function waitForVizzu(timeoutMs = 4000) {
  return new Promise(resolve => {
    if (window.Vizzu) return resolve(window.Vizzu);
    const t = setTimeout(() => resolve(null), timeoutMs);
    const check = setInterval(() => {
      if (window.Vizzu) { clearInterval(check); clearTimeout(t); resolve(window.Vizzu); }
    }, 30);
  });
}

function buildVizzuStyle() {
  // Map theme CSS custom properties → Vizzu style object so charts inherit theme.
  const cs = getComputedStyle(document.documentElement);
  const get = k => (cs.getPropertyValue(k) || "").trim();
  const palette = [1, 2, 3, 4, 5, 6, 7]
    .map(i => get(`--cat-${i}`)).filter(Boolean).join(" ");
  const ink     = get("--ink") || "#111";
  const inkSoft = get("--ink-soft") || "#666";
  const inkFaint= get("--ink-faint") || "#999";
  const bgElev  = get("--bg-elev") || "#fff";
  const fontDisplay = get("--font-display") || "Georgia, serif";
  const fontBody    = get("--font-body")    || "system-ui, sans-serif";

  return {
    fontFamily: fontBody,
    backgroundColor: bgElev,
    plot: {
      backgroundColor: bgElev,
      marker: { colorPalette: palette || undefined },
      xAxis: {
        label: { fontSize: 11, color: inkFaint },
        title: { color: inkSoft, fontSize: 11 },
        interlacing: { color: "#00000000" },   // hide alternating bands (transparent)
      },
      yAxis: {
        label: { fontSize: 11, color: inkFaint },
        title: { color: inkSoft, fontSize: 11 },
        interlacing: { color: "#00000000" },
      },
    },
    title: {
      fontFamily: fontDisplay,
      color: ink,
      fontSize: 18,
      paddingTop: 8, paddingBottom: 8,
    },
    legend: {
      label: { color: inkSoft, fontSize: 11 },
      title: { color: inkSoft, fontSize: 11 },
    },
    logo: { filter: "opacity(0)" },             // hide Vizzu logo
  };
}

async function activateVizzuScene(sceneEl, scene, data, slidesMode = false) {
  const Vizzu = await waitForVizzu();
  if (!Vizzu) {
    console.warn("Vizzu not available — scene", scene.id, "will be inert.");
    return null;
  }
  const records = data.datasets?.[scene.dataset];
  if (!Array.isArray(records) || records.length === 0) {
    console.warn("Vizzu scene", scene.id, "missing dataset:", scene.dataset);
    return null;
  }

  const mount = sceneEl.querySelector(`[data-mount="${scene.id}"]`);
  const chart = new Vizzu(mount);

  const series = (scene.series || []).map(s => ({
    name: s.name,
    type: s.type === "measure" ? "measure" : "dimension",
  }));

  // Custom renderer can override default behavior.
  const customRenderer = SCENE_RENDERERS[scene.id];
  if (customRenderer) {
    return customRenderer(mount, data, scene); // hand it the mount; it owns the chart
  }

  const themeStyle = buildVizzuStyle();
  const userStyle  = scene.style || {};

  await chart.initializing;
  const firstFrame = (scene.frames && scene.frames[0]) || {};
  try {
    await chart.animate({
      data: { series, records },
      config: firstFrame.config || {},
      style:  { ...themeStyle, ...userStyle },
    });
  } catch (e) {
    console.error(`[dstory] Vizzu init failed for scene "${scene.id}":`, e?.message || e);
    // Recover gracefully: re-try without the theme style override. Most of our
    // Vizzu issues historically have been style-shape mismatches; the chart
    // itself is usually fine.
    try {
      await chart.animate({
        data: { series, records },
        config: firstFrame.config || {},
      });
      console.warn(`[dstory] Scene "${scene.id}" rendered with default Vizzu style (theme override rejected).`);
    } catch (e2) {
      console.error(`[dstory] Scene "${scene.id}" failed to render even without style:`, e2?.message || e2);
      // Don't throw — let the rest of the page initialize.
    }
  }

  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const duration = reduce ? 0 : (scene.duration || 1.0);

  // Morph scheduler: latest target wins. chart.animate() QUEUES animations,
  // so a fast scroll through N steps would otherwise play N back-to-back
  // morphs while the text runs ahead of the chart. While a morph is in
  // flight we keep only the newest requested frame and play it when the
  // current one finishes — stale intermediate frames are skipped. (Frames
  // should be self-contained for this reason: set geometry, coordSystem,
  // and any align/split resets explicitly in every frame.)
  let morphing = false;
  let queuedConfig = null;
  function morphTo(config) {
    if (morphing) { queuedConfig = config; return; }
    morphing = true;
    const next = () => {
      morphing = false;
      if (queuedConfig) {
        const c = queuedConfig;
        queuedConfig = null;
        morphTo(c);
      }
    };
    chart.animate({ config }, duration).then(next, next);
  }

  // ctrl that the slides controller (or scroll mode) can call to morph to a frame.
  const ctrl = {
    onStep(i /*, direction */) {
      const frame = (scene.frames || [])[i];
      if (frame && frame.config) morphTo(frame.config);
    },
  };

  if (slidesMode) return ctrl;

  const scroller = scrollama();
  scroller.setup({
    step: sceneEl.querySelectorAll(".step"),
    offset: 0.5,
    debug: false,
  }).onStepEnter(({ element, index, direction }) => {
    element.classList.add("is-active");
    ctrl.onStep(index, direction);
  }).onStepExit(({ element, direction }) => {
    if (direction === "up") element.classList.remove("is-active");
  });
  window.addEventListener("resize", () => scroller.resize());
  return ctrl;
}

function setupProgressRail() {
  // Reading progress (scroll mode). The rail lives in index.html; we only
  // drive the fill's scaleX from scroll position, throttled to one rAF.
  const fill = document.querySelector("[data-progress] .progress-rail__fill");
  if (!fill) return;
  let raf = null;
  const update = () => {
    const total = document.documentElement.scrollHeight - window.innerHeight;
    const p = total > 0 ? Math.min(1, Math.max(0, window.scrollY / total)) : 0;
    fill.style.transform = `scaleX(${p})`;
    raf = null;
  };
  const onScroll = () => { if (!raf) raf = requestAnimationFrame(update); };
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);
  update();
}

function setupSlidesController(builtScenes, data) {
  const heroEl  = document.querySelector(".hero");
  const outroEl = document.querySelector(".outro");
  document.documentElement.classList.add("story-mode--slides");
  document.body.classList.add("story-mode--slides");

  // Flat slide list: [hero, ...one-per-step-or-frame, outro].
  const slides = [];
  if (heroEl) slides.push({ kind: "hero", el: heroEl });
  for (const entry of builtScenes) {
    const stepCount = entry.scene.steps?.length || entry.scene.frames?.length || 1;
    for (let i = 0; i < stepCount; i++) {
      slides.push({ kind: "scene", el: entry.node, sceneEntry: entry, stepIdx: i, totalSteps: stepCount });
    }
  }
  if (outroEl) slides.push({ kind: "outro", el: outroEl });

  // Initialize: every slide hidden except the first.
  slides.forEach((s, i) => {
    if (i === 0) {
      s.el.classList.add("is-current");
    } else {
      s.el.setAttribute("aria-hidden", "true");
    }
  });

  let current = 0;
  const indicator = document.querySelector("[data-slide-indicator]");
  const updateIndicator = () => {
    if (indicator) indicator.textContent = `${current + 1} / ${slides.length}`;
  };
  updateIndicator();

  // Deep-linking: keep #slide-N in the URL so a specific slide can be shared
  // ("open the deck at slide 12"). replaceState avoids history spam.
  const syncHash = () => {
    try { history.replaceState(null, "", `#slide-${current + 1}`); } catch (_) {}
  };

  function show(idx, dir = "forward") {
    if (idx < 0 || idx >= slides.length) return;
    if (idx === current) return;
    const prev = slides[current];
    const next = slides[idx];

    if (prev.el !== next.el) {
      prev.el.classList.remove("is-current");
      prev.el.setAttribute("aria-hidden", "true");
      next.el.classList.add("is-current");
      next.el.removeAttribute("aria-hidden");
    }

    if (next.kind === "scene") {
      const steps = next.el.querySelectorAll(".step");
      steps.forEach((st, i) => st.classList.toggle("is-active", i === next.stepIdx));
      if (next.sceneEntry.ctrl?.onStep) {
        next.sceneEntry.ctrl.onStep(next.stepIdx, dir === "forward" ? "down" : "up");
      }
    }

    current = idx;
    updateIndicator();
    syncHash();
  }

  // Trigger first slide's chart state if applicable.
  const first = slides[0];
  if (first?.kind === "scene") {
    const steps = first.el.querySelectorAll(".step");
    steps.forEach((st, i) => st.classList.toggle("is-active", i === first.stepIdx));
    if (first.sceneEntry.ctrl?.onStep) first.sceneEntry.ctrl.onStep(first.stepIdx, "down");
  }

  // Keyboard navigation
  document.addEventListener("keydown", (e) => {
    if (e.target.matches?.("input, textarea, [contenteditable]")) return;
    switch (e.key) {
      case "ArrowRight":
      case "PageDown":
      case " ":
        e.preventDefault(); show(current + 1, "forward"); break;
      case "ArrowLeft":
      case "PageUp":
        e.preventDefault(); show(current - 1, "backward"); break;
      case "Home":
        e.preventDefault(); show(0, "backward"); break;
      case "End":
        e.preventDefault(); show(slides.length - 1, "forward"); break;
    }
  });

  // Click-anywhere navigation (skip interactive elements + the controls bar)
  document.addEventListener("click", (e) => {
    if (e.target.closest("a, button, input, textarea, select, [contenteditable], [data-slide-controls]")) return;
    if (e.shiftKey) show(current - 1, "backward");
    else show(current + 1, "forward");
  });

  // Buttons
  document.querySelector("[data-slide-prev]")?.addEventListener("click", () => show(current - 1, "backward"));
  document.querySelector("[data-slide-next]")?.addEventListener("click", () => show(current + 1, "forward"));

  // Reveal the controls.
  const controlsEl = document.querySelector("[data-slide-controls]");
  if (controlsEl) controlsEl.removeAttribute("hidden");

  // Honor an incoming #slide-N deep link.
  const hashMatch = location.hash.match(/^#slide-(\d+)$/);
  if (hashMatch) {
    const idx = Math.min(slides.length - 1, Math.max(0, parseInt(hashMatch[1], 10) - 1));
    if (idx > 0) show(idx, "forward");
  }
}

async function init() {
  await waitForMotion();
  const data = await getData();

  // Language / direction — bundle time patches the static <html> tag; this
  // covers dev mode (fetch) and keeps the two paths consistent.
  if (data.meta?.lang) document.documentElement.lang = data.meta.lang;
  if (data.meta?.dir && data.meta.dir !== "ltr") document.documentElement.dir = data.meta.dir;

  renderHero(data.meta || {});
  renderSources(data.meta?.sources || [], data.meta || {});

  const slidesMode = data.meta?.mode === "slides";
  if (slidesMode) {
    document.documentElement.classList.add("story-mode--slides");
    document.body.classList.add("story-mode--slides");
  } else {
    setupProgressRail();
  }

  const story = document.getElementById("story");
  const built = (data.scenes || []).map(s => {
    const node = buildScene(s);
    story.append(node);
    return { node, scene: s, ctrl: null };
  });

  // Wait one frame so layout settles before activating renderers.
  // We use setTimeout(16) rather than requestAnimationFrame because rAF can
  // be starved on very long pages (>10k px) when other scripts (e.g. Vizzu
  // wasm) are still initializing. setTimeout always fires.
  await new Promise(r => setTimeout(r, 16));
  for (const entry of built) {
    const s = entry.scene;
    try {
      if (s.kind === "scrolly")      entry.ctrl = activateScrollyScene(entry.node, s, data, slidesMode);
      else if (s.kind === "bleed")   entry.ctrl = activateBleedScene(entry.node, s, data, slidesMode);
      else if (s.kind === "pinned")  entry.ctrl = activatePinnedScene(entry.node, s, data, slidesMode);
      else if (s.kind === "vizzu")   entry.ctrl = await activateVizzuScene(entry.node, s, data, slidesMode);
      else if (s.kind === "custom")  entry.ctrl = activateCustomScene(entry.node, s, data, slidesMode);
      else                            entry.ctrl = activateSimpleScene(entry.node, s, data, slidesMode);
    } catch (sceneErr) {
      // Don't let one failing scene kill the rest of the page.
      console.error(`[dstory] Scene "${s.id}" failed to activate:`, sceneErr?.message || sceneErr);
    }
  }

  if (slidesMode) setupSlidesController(built, data);
}

// Defer init until DOMContentLoaded so all `<script defer>` scenes have had
// a chance to call STORY.register() (defer scripts execute in document order
// and complete before DOMContentLoaded fires).
if (document.readyState === "complete") {
  // Page already fully loaded — call init directly on next microtask.
  Promise.resolve().then(init);
} else {
  document.addEventListener("DOMContentLoaded", () => init(), { once: true });
}

</script>
  <!-- DSTORY:SCENES — use dstory.write_scene() or dstory.wire_scenes() to add scene script tags here. -->

</body>
